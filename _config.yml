title: "Jean Pougoue - Cloud Security Engineer"
description: "Documenting my journey from network engineering to cloud security."
author: "Jean Pougoue"
email: "jdd.pougoue@gmail.com"
baseurl: ""
url: "https://k3n-p4-chi.github.io"

theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

exclude:
  - project-sources/
  - .claude/
  - BLOG_WORKFLOW.md
  - SETUP_GITHUB_AUTH.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitattributes

header_pages:
  - about.md
  - continuous-learning.md
  - cybersecurity-labs.md
  - home-projects.md
  - skills-applied-at-work.md
  - planning-tools.md
  - resources.md
  - contact.md
  - posts.md

show_excerpts: true
paginate: 5

github_username: k3n-p4-chi
linkedin_username: jean-pougoue

collections:
  study-notes:
    output: true
    permalink: /study-notes/:path/
  planning-tools:
    output: true
    permalink: /planning-tools/:path/
  cybersecurity-labs:
    output: true
    permalink: /cybersecurity-labs/:path/
  home-projects:
    output: true
    permalink: /home-projects/:path/
  work-applied:
    output: true
    permalink: /skills-applied-at-work/:path/

defaults:
  - scope:
      path: ""
      type: "study-notes"
    values:
      layout: "post"
      section: "Study Notes"
  - scope:
      path: ""
      type: "planning-tools"
    values:
      layout: "post"
      section: "Planning Tools"
  - scope:
      path: ""
      type: "cybersecurity-labs"
    values:
      layout: "post"
      section: "Cybersecurity Labs"
  - scope:
      path: ""
      type: "home-projects"
    values:
      layout: "post"
      section: "Home Projects"
  - scope:
      path: ""
      type: "work-applied"
    values:
      layout: "post"
      section: "Skills Applied for Work"
